<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable: safe zone = inner 75% (384x384, offset 64) -->
  <rect width="512" height="512" fill="#0f172a"/>

  <!-- Chama exterior (glow) -->
  <path d="M256 72 C213 122 168 158 154 218 C140 278 160 330 208 368 C194 346 187 320 192 291 C197 262 220 240 256 226 C292 240 315 262 320 291 C325 320 318 346 304 368 C352 330 372 278 358 218 C344 158 299 122 256 72Z"
    fill="#f59e0b" opacity="0.25"/>

  <!-- Chama principal -->
  <path d="M256 96 C220 144 194 182 186 232 C178 282 196 330 256 373 C316 330 334 282 326 232 C318 182 292 144 256 96Z"
    fill="#f59e0b"/>

  <!-- Brilho interno (chama branca-âmbar) -->
  <path d="M256 138 C236 172 224 204 224 240 C224 280 236 308 256 322 C276 308 288 280 288 240 C288 204 276 172 256 138Z"
    fill="#fde68a" opacity="0.55"/>

  <!-- Chama viva — ponta superior -->
  <path d="M256 108 C248 124 244 136 244 148 C244 162 250 170 256 172 C262 170 268 162 268 148 C268 136 264 124 256 108Z"
    fill="white" opacity="0.2"/>

  <!-- Cruz integrada na chama -->
  <rect x="244" y="152" width="24" height="192" rx="12" fill="#0f172a"/>
  <rect x="184"  y="232" width="144" height="24" rx="12" fill="#0f172a"/>

  <!-- Âncora: barra horizontal -->
  <rect x="202" y="392" width="108" height="20" rx="10" fill="#f59e0b"/>
  <!-- Âncora: haste vertical -->
  <line x1="256" y1="373" x2="256" y2="465" stroke="#f59e0b" stroke-width="18" stroke-linecap="round"/>
  <!-- Âncora: gancho esquerdo -->
  <path d="M202 402 Q176 418 176 445 Q178 466 202 468" fill="none" stroke="#f59e0b" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Âncora: gancho direito -->
  <path d="M310 402 Q336 418 336 445 Q334 466 310 468" fill="none" stroke="#f59e0b" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Círculo de glória ao redor da chama (sutil) -->
  <circle cx="256" cy="240" r="130" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.12"/>
</svg>
