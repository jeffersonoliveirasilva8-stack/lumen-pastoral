<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Fundo gradient sacro -->
  <rect width="1200" height="630" fill="#0f172a"/>
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="60%" stop-color="#1e3a5f" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grid sutil de linhas decorativas -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="#f59e0b" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="0" y1="629" x2="1200" y2="629" stroke="#f59e0b" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="1" y1="0" x2="1" y2="630" stroke="#f59e0b" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="1199" y1="0" x2="1199" y2="630" stroke="#f59e0b" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Ornamento de arco superior -->
  <path d="M400 0 Q600 80 800 0" fill="none" stroke="#f59e0b" stroke-opacity="0.06" stroke-width="1.5"/>
  <path d="M300 0 Q600 120 900 0" fill="none" stroke="#f59e0b" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Símbolo central grande (chama-cruz-âncora) -->
  <!-- Chama exterior glow -->
  <path d="M600 148 C565 192 527 222 516 268 C505 314 518 356 548 382 C535 364 529 342 533 318 C537 294 553 276 600 260 C647 276 663 294 667 318 C671 342 665 364 652 382 C682 356 695 314 684 268 C673 222 635 192 600 148Z"
    fill="#f59e0b" opacity="0.15" filter="url(#blur-sm)"/>

  <!-- Chama principal -->
  <path d="M600 162 C575 200 558 228 554 262 C550 296 562 326 600 352 C638 326 650 296 646 262 C642 228 625 200 600 162Z"
    fill="#f59e0b"/>

  <!-- Brilho interno -->
  <path d="M600 186 C588 208 580 228 580 250 C580 276 588 292 600 300 C612 292 620 276 620 250 C620 228 612 208 600 186Z"
    fill="#fde68a" opacity="0.6"/>

  <!-- Chama viva topo -->
  <path d="M600 172 C594 184 591 194 591 204 C591 216 595 222 600 224 C605 222 609 216 609 204 C609 194 606 184 600 172Z"
    fill="white" opacity="0.25"/>

  <!-- Cruz -->
  <rect x="591" y="188" width="18" height="144" rx="9" fill="#0f172a" opacity="0.85"/>
  <rect x="552" y="248" width="96" height="18"  rx="9" fill="#0f172a" opacity="0.85"/>

  <!-- Âncora: barra -->
  <rect x="566" y="360" width="68" height="14" rx="7" fill="#f59e0b"/>
  <!-- Âncora: haste -->
  <line x1="600" y1="352" x2="600" y2="415" stroke="#f59e0b" stroke-width="13" stroke-linecap="round"/>
  <!-- Âncora: ganchos -->
  <path d="M566 367 Q545 380 545 400 Q547 418 566 420" fill="none" stroke="#f59e0b" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M634 367 Q655 380 655 400 Q653 418 634 420" fill="none" stroke="#f59e0b" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Círculo de glória (sutil) -->
  <circle cx="600" cy="280" r="140" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1"/>
  <circle cx="600" cy="280" r="160" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.06"/>

  <!-- Linha divisória dourada -->
  <line x1="480" y1="450" x2="720" y2="450" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <!-- Ornamento central na linha -->
  <circle cx="600" cy="450" r="3" fill="#f59e0b" opacity="0.6"/>
  <circle cx="580" cy="450" r="1.5" fill="#f59e0b" opacity="0.3"/>
  <circle cx="620" cy="450" r="1.5" fill="#f59e0b" opacity="0.3"/>

  <!-- Nome da marca -->
  <text x="600" y="510"
    font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="700"
    text-anchor="middle"
    letter-spacing="-1"
    fill="#f8fafc">Lumen Pastoral</text>

  <!-- Tagline -->
  <text x="600" y="558"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="400"
    text-anchor="middle"
    letter-spacing="4"
    fill="#94a3b8">GESTÃO LITÚRGICA PARA PARÓQUIAS</text>
</svg>
